<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Empire Streets - Drug Lab Core</title>
  <style>
    :root {
      --bg-0: #06090f;
      --bg-1: #0b1321;
      --bg-2: #101a2d;
      --surface: #16233c;
      --surface-2: #1f2f4f;
      --text: #e9f2ff;
      --muted: #99accc;
      --accent: #52f7d9;
      --warning: #f7c852;
      --danger: #ff5f6d;
      --ok: #5cf799;
      --line: #2b4169;
      --chip: #263a61;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(80rem 50rem at 15% -10%, rgba(82, 247, 217, 0.13), transparent 70%),
        radial-gradient(60rem 35rem at 120% 20%, rgba(92, 126, 247, 0.14), transparent 70%),
        linear-gradient(170deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)) var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.3px;
      font-weight: 700;
    }

    .panel-head-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .panel-body {
      padding: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 10px;
      padding: 10px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat .value {
      font-size: 19px;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
    }

    .layout-main {
      display: grid;
      gap: 16px;
      grid-template-columns: minmax(340px, 1fr) minmax(440px, 1.3fr);
    }

    @media (max-width: 980px) {
      .layout-main {
        grid-template-columns: 1fr;
      }
    }

    .drug-lab-meta {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--text);
      font-size: 11px;
      border: 1px solid var(--line);
    }

    .slot-grid {
      display: grid;
      gap: 10px;
    }

    .slot-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px;
      background: var(--surface-2);
      display: grid;
      gap: 9px;
    }

    .slot-card.locked {
      opacity: 0.52;
      filter: grayscale(0.35);
    }

    .slot-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .slot-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    select,
    button {
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--text);
      background: #14233e;
      padding: 7px 10px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #1d3257, #152744);
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      border-color: #4e7ccc;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-good {
      border-color: #2f7f63;
      background: linear-gradient(180deg, #14513f, #0f3f31);
    }

    .btn-warn {
      border-color: #966f20;
      background: linear-gradient(180deg, #5a430f, #443007);
    }

    .btn-danger {
      border-color: #9e3b48;
      background: linear-gradient(180deg, #5d2131, #461927);
    }

    .storage-list,
    .inventory-list,
    .effects-list,
    .log-list,
    .actions-list {
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: rgba(17, 33, 58, 0.78);
      font-size: 13px;
    }

    .row .left {
      display: grid;
      gap: 2px;
    }

    .row .name {
      font-weight: 700;
    }

    .row .desc {
      color: var(--muted);
      font-size: 12px;
    }

    .row .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .log-list {
      max-height: 280px;
      overflow: auto;
      padding-right: 2px;
    }

    .log-entry {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(11, 22, 40, 0.92);
      font-size: 12px;
      line-height: 1.35;
    }

    .log-time {
      color: var(--muted);
      margin-right: 7px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 760px) {
      .split {
        grid-template-columns: 1fr;
      }
    }

    .tiny {
      font-size: 12px;
      color: var(--muted);
    }

    .status-ok {
      color: var(--ok);
    }

    .status-warn {
      color: var(--warning);
    }

    .status-danger {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <div class="panel-head">
        <h2>Empire Streets - Drug Lab CORE</h2>
        <div class="panel-head-right">
          <button id="toggleWarehouseBtn" class="btn-warn">Přepnout vlastnictví skladu</button>
          <span class="pill" id="clockLabel">Clock</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="grid stats-grid" id="playerStats"></div>
      </div>
    </section>

    <div class="layout-main">
      <section class="panel">
        <div class="panel-head">
          <h3>Drug Lab Building</h3>
          <button id="upgradeBtn" class="btn-warn">Upgrade</button>
        </div>
        <div class="panel-body grid">
          <div class="drug-lab-meta" id="drugLabMeta"></div>
          <div class="tiny" id="upgradeInfo"></div>
          <div class="tiny" id="warehouseBonusInfo"></div>

          <div class="panel" style="background: transparent;">
            <div class="panel-head">
              <h3>Production Slots</h3>
              <span class="pill" id="slotSummary">0/0 producing</span>
            </div>
            <div class="panel-body">
              <div class="slot-grid" id="slotGrid"></div>
            </div>
          </div>

          <div class="split">
            <div class="panel" style="background: transparent;">
              <div class="panel-head">
                <h3>Lab Storage</h3>
                <button id="collectBtn" class="btn-good">Collect Drugs</button>
              </div>
              <div class="panel-body">
                <div class="storage-list" id="labStorageList"></div>
              </div>
            </div>

            <div class="panel" style="background: transparent;">
              <div class="panel-head">
                <h3>Special Actions</h3>
              </div>
              <div class="panel-body">
                <div class="actions-list" id="actionsList"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Player Drug Inventory</h3>
        </div>
        <div class="panel-body">
          <div class="inventory-list" id="inventoryList"></div>
        </div>

        <div class="panel-head">
          <h3>Active Effects</h3>
        </div>
        <div class="panel-body">
          <div class="effects-list" id="effectsList"></div>
        </div>

        <div class="panel-head">
          <h3>Event Log</h3>
        </div>
        <div class="panel-body">
          <div class="log-list" id="eventLogList"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ==================================================
    // CONFIGURATION
    // ==================================================
    const HOUR_MS = 60 * 60 * 1000;
    const UI_REFRESH_MS = 1000;
    const MAX_LAB_LEVEL = 4;
    const BASE_STORAGE_PER_LEVEL = 100;
    const SLOT_LIMIT_BY_LEVEL = {
      1: 1,
      2: 2,
      3: 3,
      4: 4
    };
    const UPGRADE_COSTS = {
      2: 5000,
      3: 15000,
      4: 40000
    };

    const SPECIAL_ACTION_CONFIG = {
      overclock: {
        id: "overclock",
        name: "Overclock Production",
        cooldownMs: 6 * HOUR_MS,
        durationMs: 2 * HOUR_MS
      },
      cleanBatch: {
        id: "cleanBatch",
        name: "Clean Batch",
        cooldownMs: 5 * HOUR_MS,
        durationMs: 2 * HOUR_MS
      },
      hiddenOperation: {
        id: "hiddenOperation",
        name: "Hidden Operation",
        cooldownMs: 6 * HOUR_MS,
        durationMs: 2 * HOUR_MS
      }
    };

    const DRUG_CONFIG = {
      neonDust: {
        id: "neonDust",
        name: "Neon Dust",
        productionPerHour: 20,
        heatPerHour: 1,
        useAmount: 5,
        effectDurationMs: 2 * HOUR_MS,
        description: "+10% street dealer income, +5% dirty cash from gambling and convenience"
      },
      pulseShot: {
        id: "pulseShot",
        name: "Pulse Shot",
        productionPerHour: 10,
        heatPerHour: 2,
        useAmount: 3,
        effectDurationMs: 2 * HOUR_MS,
        description: "+15% production speed for all buildings"
      },
      velvetSmoke: {
        id: "velvetSmoke",
        name: "Velvet Smoke",
        productionPerHour: 6,
        heatPerHour: 3,
        useAmount: 2,
        effectDurationMs: 2 * HOUR_MS,
        description: "+20% influence, +10% restaurant and club income"
      },
      ghostSerum: {
        id: "ghostSerum",
        name: "Ghost Serum",
        productionPerHour: 3,
        heatPerHour: 4,
        useAmount: 1,
        effectDurationMs: 2 * HOUR_MS,
        description: "-20% police raid chance, -15% heat gain"
      },
      overdriveX: {
        id: "overdriveX",
        name: "Overdrive X",
        productionPerHour: 1,
        heatPerHour: 6,
        useAmount: 1,
        effectDurationMs: 2 * HOUR_MS,
        description: "+25% gang power, +20% all income, +8 instant heat and +20% raid chance"
      }
    };

    const DRUG_ORDER = ["neonDust", "pulseShot", "velvetSmoke", "ghostSerum", "overdriveX"];

    // ==================================================
    // DATA MODEL
    // ==================================================
    class PlayerModel {
      constructor() {
        this.id = "player-1";
        this.name = "V";
        this.cash = 65000;
        this.dirtyCash = 8200;
        this.influence = 145;
        this.gangMembers = 58;
        this.totalHeat = 0;
        this.drugs = this.createDrugCountMap();
        this.enhancedDrugs = this.createDrugCountMap();
        this.activeDrugEffects = {
          neonDust: { active: false, endsAt: 0, strength: 1 },
          pulseShot: { active: false, endsAt: 0, strength: 1 },
          velvetSmoke: { active: false, endsAt: 0, strength: 1 },
          ghostSerum: { active: false, endsAt: 0, strength: 1 },
          overdriveX: { active: false, endsAt: 0, strength: 1 },
          overdriveCrash: { active: false, endsAt: 0, strength: 1 }
        };
      }

      createDrugCountMap() {
        return {
          neonDust: 0,
          pulseShot: 0,
          velvetSmoke: 0,
          ghostSerum: 0,
          overdriveX: 0
        };
      }
    }

    class DrugLabBuilding {
      constructor(playerId) {
        this.id = "building-drug-lab-1";
        this.type = "drugLab";
        this.name = "Drug Lab";
        this.level = 1;
        this.ownerId = playerId;
        this.districtId = "district-59";
        this.slots = Array.from({ length: 4 }, (_, index) => ({
          id: index + 1,
          activeDrugType: "neonDust",
          isProducing: false,
          producedAmount: 0,
          lastTick: Date.now(),
          startedAt: 0
        }));
        this.storage = this.createStorageMap();
        this.storageFullNoticeShown = false;

        this.overclockActive = false;
        this.overclockEndsAt = 0;
        this.overclockCooldownEndsAt = 0;

        this.cleanBatchActive = false;
        this.cleanBatchEndsAt = 0;
        this.cleanBatchCooldownEndsAt = 0;

        this.hiddenOperationActive = false;
        this.hiddenOperationEndsAt = 0;
        this.hiddenOperationCooldownEndsAt = 0;

        this.lastHeatTick = Date.now();
      }

      createStorageMap() {
        const storage = {};
        for (const drugId of DRUG_ORDER) {
          storage[drugId] = { normal: 0, enhanced: 0 };
        }
        return storage;
      }
    }

    // ==================================================
    // CORE LOGIC
    // ==================================================
    class DrugLabCoreSystem {
      constructor(player, drugLab) {
        this.player = player;
        this.drugLab = drugLab;
        this.eventLog = [];
      }

      // Shared scaling helper: +10% per level above level 1
      getScaledStat(baseValue, level) {
        const multiplier = 1 + Math.max(0, level - 1) * 0.1;
        return baseValue * multiplier;
      }

      getUnlockedSlotCount() {
        return SLOT_LIMIT_BY_LEVEL[this.drugLab.level] || 1;
      }

      getStorageCapacity() {
        return this.drugLab.level * BASE_STORAGE_PER_LEVEL;
      }

      getCurrentStoredTotal() {
        return DRUG_ORDER.reduce((total, drugId) => {
          const stack = this.drugLab.storage[drugId];
          return total + stack.normal + stack.enhanced;
        }, 0);
      }

      canStoreMore(amount) {
        return this.getCurrentStoredTotal() + amount <= this.getStorageCapacity() + 0.0001;
      }

      startProduction(slotId, drugType) {
        const slot = this.drugLab.slots.find((item) => item.id === slotId);
        if (!slot) {
          return false;
        }
        if (slotId > this.getUnlockedSlotCount()) {
          this.logEvent("Attempted to start a locked slot.");
          return false;
        }
        if (!DRUG_CONFIG[drugType]) {
          this.logEvent("Invalid drug type selected.");
          return false;
        }

        slot.activeDrugType = drugType;
        slot.isProducing = true;
        slot.lastTick = Date.now();
        slot.startedAt = Date.now();
        this.logEvent("Slot #" + slot.id + " started: " + DRUG_CONFIG[drugType].name + ".");
        return true;
      }

      stopProduction(slotId) {
        const slot = this.drugLab.slots.find((item) => item.id === slotId);
        if (!slot || !slot.isProducing) {
          return false;
        }
        slot.isProducing = false;
        slot.lastTick = Date.now();
        this.logEvent("Slot #" + slot.id + " stopped.");
        return true;
      }

      getProductionMultiplier() {
        let multiplier = 1;
        const levelBonusMultiplier = 1 + Math.max(0, this.drugLab.level - 1) * 0.1;
        multiplier *= levelBonusMultiplier;

        if (this.drugLab.overclockActive) {
          multiplier *= 1.5;
        }
        if (this.drugLab.hiddenOperationActive) {
          multiplier *= 0.8;
        }

        const pulseEffect = this.player.activeDrugEffects.pulseShot;
        if (pulseEffect.active) {
          multiplier *= 1 + 0.15 * pulseEffect.strength;
        }

        const crashEffect = this.player.activeDrugEffects.overdriveCrash;
        if (crashEffect.active) {
          multiplier *= 0.9;
        }
        return multiplier;
      }

      updateProduction() {
        const now = Date.now();
        const productionMultiplier = this.getProductionMultiplier();
        let freeCapacity = this.getStorageCapacity() - this.getCurrentStoredTotal();
        let producedThisTick = 0;

        for (const slot of this.drugLab.slots) {
          if (!slot.isProducing || slot.id > this.getUnlockedSlotCount()) {
            continue;
          }
          const drugType = slot.activeDrugType;
          const config = DRUG_CONFIG[drugType];
          const elapsedMs = Math.max(0, now - slot.lastTick);
          if (elapsedMs <= 0) {
            continue;
          }

          const perHour = this.getScaledStat(config.productionPerHour, this.drugLab.level);
          const rawProduced = (perHour * productionMultiplier * elapsedMs) / HOUR_MS;
          if (rawProduced <= 0) {
            slot.lastTick = now;
            continue;
          }

          const allowedAmount = Math.min(rawProduced, Math.max(0, freeCapacity));
          if (allowedAmount > 0) {
            const stack = this.drugLab.storage[drugType];
            if (this.drugLab.cleanBatchActive) {
              stack.enhanced += allowedAmount;
            } else {
              stack.normal += allowedAmount;
            }
            slot.producedAmount += allowedAmount;
            producedThisTick += allowedAmount;
            freeCapacity -= allowedAmount;
          }

          slot.lastTick = now;
        }

        if (producedThisTick > 0) {
          this.drugLab.storageFullNoticeShown = false;
        }

        if (freeCapacity <= 0.0001 && !this.drugLab.storageFullNoticeShown) {
          this.drugLab.storageFullNoticeShown = true;
          this.logEvent("Lab storage is full. Production paused until drugs are collected.");
        }
      }

      collectDrugs() {
        const beforeTotal = this.getCurrentStoredTotal();
        if (beforeTotal <= 0) {
          return false;
        }
        for (const drugId of DRUG_ORDER) {
          const stack = this.drugLab.storage[drugId];
          const total = stack.normal + stack.enhanced;
          if (total <= 0) {
            continue;
          }
          this.player.drugs[drugId] += total;
          this.player.enhancedDrugs[drugId] += stack.enhanced;
          stack.normal = 0;
          stack.enhanced = 0;
        }
        this.logEvent("Collected " + this.formatNumber(beforeTotal) + " drugs from lab storage.");
        return true;
      }

      useDrug(drugType) {
        const config = DRUG_CONFIG[drugType];
        if (!config) {
          return false;
        }
        const amountNeeded = config.useAmount;
        if (this.player.drugs[drugType] < amountNeeded) {
          this.logEvent("Not enough " + config.name + " to use.");
          return false;
        }

        this.player.drugs[drugType] -= amountNeeded;

        const enhancedAvailable = this.player.enhancedDrugs[drugType];
        const enhancedUsed = Math.min(enhancedAvailable, amountNeeded);
        if (enhancedUsed > 0) {
          this.player.enhancedDrugs[drugType] -= enhancedUsed;
        }
        const fullEnhancedDose = enhancedUsed === amountNeeded;
        const strength = fullEnhancedDose ? 1.2 : 1;

        this.applyDrugEffect(drugType, strength);

        if (drugType === "overdriveX") {
          this.player.totalHeat += 8;
        }

        const qualityText = fullEnhancedDose ? " (enhanced batch)" : "";
        this.logEvent("Used " + config.name + qualityText + ".");
        return true;
      }

      applyDrugEffect(drugType, strength = 1) {
        const config = DRUG_CONFIG[drugType];
        if (!config) {
          return false;
        }
        const effect = this.player.activeDrugEffects[drugType];
        effect.active = true;
        effect.endsAt = Date.now() + config.effectDurationMs;
        effect.strength = strength;
        this.logEvent(config.name + " effect started for " + this.formatDuration(config.effectDurationMs) + ".");
        return true;
      }

      updateDrugEffects() {
        const now = Date.now();
        for (const effectId of Object.keys(this.player.activeDrugEffects)) {
          const effect = this.player.activeDrugEffects[effectId];
          if (!effect.active || effect.endsAt > now) {
            continue;
          }

          effect.active = false;
          effect.endsAt = 0;
          effect.strength = 1;

          if (effectId === "overdriveX") {
            const crash = this.player.activeDrugEffects.overdriveCrash;
            crash.active = true;
            crash.endsAt = now + HOUR_MS;
            crash.strength = 1;
            this.logEvent("Overdrive X ended. Crash active for 1h (-10% performance).");
          } else if (effectId === "overdriveCrash") {
            this.logEvent("Overdrive crash ended.");
          } else {
            const label = DRUG_CONFIG[effectId] ? DRUG_CONFIG[effectId].name : effectId;
            this.logEvent(label + " effect ended.");
          }
        }
      }

      calculateCurrentHeatPerHour() {
        let total = 0;
        for (const slot of this.drugLab.slots) {
          if (!slot.isProducing || slot.id > this.getUnlockedSlotCount()) {
            continue;
          }
          const config = DRUG_CONFIG[slot.activeDrugType];
          if (!config) {
            continue;
          }
          total += config.heatPerHour;
        }

        if (this.drugLab.hiddenOperationActive) {
          total *= 0.7;
        }

        const ghostEffect = this.player.activeDrugEffects.ghostSerum;
        if (ghostEffect.active) {
          total *= 1 - 0.15 * ghostEffect.strength;
        }
        return total;
      }

      applyPassiveHeat() {
        const now = Date.now();
        const elapsedMs = Math.max(0, now - this.drugLab.lastHeatTick);
        this.drugLab.lastHeatTick = now;
        if (elapsedMs <= 0) {
          return;
        }
        const heatPerHour = this.calculateCurrentHeatPerHour();
        if (heatPerHour <= 0) {
          return;
        }
        const deltaHeat = (heatPerHour * elapsedMs) / HOUR_MS;
        this.player.totalHeat += deltaHeat;
      }

      upgradeBuilding(player) {
        if (this.drugLab.level >= MAX_LAB_LEVEL) {
          this.logEvent("Drug Lab is already max level.");
          return false;
        }
        const nextLevel = this.drugLab.level + 1;
        const cost = UPGRADE_COSTS[nextLevel];
        if (player.cash < cost) {
          this.logEvent("Not enough cash for upgrade to level " + nextLevel + ".");
          return false;
        }
        player.cash -= cost;
        this.drugLab.level = nextLevel;
        this.logEvent("Drug Lab upgraded to level " + nextLevel + " (-$" + cost.toLocaleString() + ").");
        return true;
      }

      useOverclock(player) {
        const now = Date.now();
        if (this.drugLab.overclockActive) {
          this.logEvent("Overclock is already active.");
          return false;
        }
        if (now < this.drugLab.overclockCooldownEndsAt) {
          this.logEvent("Overclock is on cooldown.");
          return false;
        }
        this.drugLab.overclockActive = true;
        this.drugLab.overclockEndsAt = now + SPECIAL_ACTION_CONFIG.overclock.durationMs;
        this.drugLab.overclockCooldownEndsAt = now + SPECIAL_ACTION_CONFIG.overclock.cooldownMs;
        player.totalHeat += 3;
        this.logEvent("Overclock activated (+50% production, +3 heat).");
        return true;
      }

      useCleanBatch(player) {
        void player;
        const now = Date.now();
        if (this.drugLab.cleanBatchActive) {
          this.logEvent("Clean Batch is already active.");
          return false;
        }
        if (now < this.drugLab.cleanBatchCooldownEndsAt) {
          this.logEvent("Clean Batch is on cooldown.");
          return false;
        }
        this.drugLab.cleanBatchActive = true;
        this.drugLab.cleanBatchEndsAt = now + SPECIAL_ACTION_CONFIG.cleanBatch.durationMs;
        this.drugLab.cleanBatchCooldownEndsAt = now + SPECIAL_ACTION_CONFIG.cleanBatch.cooldownMs;
        this.logEvent("Clean Batch activated. Produced drugs are enhanced for 2h.");
        return true;
      }

      useHiddenOperation(player) {
        void player;
        const now = Date.now();
        if (this.drugLab.hiddenOperationActive) {
          this.logEvent("Hidden Operation is already active.");
          return false;
        }
        if (now < this.drugLab.hiddenOperationCooldownEndsAt) {
          this.logEvent("Hidden Operation is on cooldown.");
          return false;
        }
        this.drugLab.hiddenOperationActive = true;
        this.drugLab.hiddenOperationEndsAt = now + SPECIAL_ACTION_CONFIG.hiddenOperation.durationMs;
        this.drugLab.hiddenOperationCooldownEndsAt = now + SPECIAL_ACTION_CONFIG.hiddenOperation.cooldownMs;
        this.logEvent("Hidden Operation activated (-30% heat, -20% production for 2h).");
        return true;
      }

      updateTimedEffects() {
        const now = Date.now();

        if (this.drugLab.overclockActive && now >= this.drugLab.overclockEndsAt) {
          this.drugLab.overclockActive = false;
          this.drugLab.overclockEndsAt = 0;
          this.logEvent("Overclock ended.");
        }

        if (this.drugLab.cleanBatchActive && now >= this.drugLab.cleanBatchEndsAt) {
          this.drugLab.cleanBatchActive = false;
          this.drugLab.cleanBatchEndsAt = 0;
          this.logEvent("Clean Batch ended.");
        }

        if (this.drugLab.hiddenOperationActive && now >= this.drugLab.hiddenOperationEndsAt) {
          this.drugLab.hiddenOperationActive = false;
          this.drugLab.hiddenOperationEndsAt = 0;
          this.logEvent("Hidden Operation ended.");
        }
      }

      getActiveModifiers() {
        const modifiers = {
          streetDealerIncomeMultiplier: 1,
          gambleAndStoreDirtyCashMultiplier: 1,
          allBuildingProductionSpeedMultiplier: 1,
          influenceGainMultiplier: 1,
          restaurantAndClubIncomeMultiplier: 1,
          districtRaidChanceMultiplier: 1,
          heatGainMultiplier: 1,
          gangPowerMultiplier: 1,
          allIncomeMultiplier: 1,
          globalPerformanceMultiplier: 1
        };

        const neon = this.player.activeDrugEffects.neonDust;
        if (neon.active) {
          modifiers.streetDealerIncomeMultiplier *= 1 + 0.1 * neon.strength;
          modifiers.gambleAndStoreDirtyCashMultiplier *= 1 + 0.05 * neon.strength;
        }

        const pulse = this.player.activeDrugEffects.pulseShot;
        if (pulse.active) {
          modifiers.allBuildingProductionSpeedMultiplier *= 1 + 0.15 * pulse.strength;
        }

        const velvet = this.player.activeDrugEffects.velvetSmoke;
        if (velvet.active) {
          modifiers.influenceGainMultiplier *= 1 + 0.2 * velvet.strength;
          modifiers.restaurantAndClubIncomeMultiplier *= 1 + 0.1 * velvet.strength;
        }

        const ghost = this.player.activeDrugEffects.ghostSerum;
        if (ghost.active) {
          modifiers.districtRaidChanceMultiplier *= 1 - 0.2 * ghost.strength;
          modifiers.heatGainMultiplier *= 1 - 0.15 * ghost.strength;
        }

        const overdrive = this.player.activeDrugEffects.overdriveX;
        if (overdrive.active) {
          modifiers.gangPowerMultiplier *= 1 + 0.25 * overdrive.strength;
          modifiers.allIncomeMultiplier *= 1 + 0.2 * overdrive.strength;
          modifiers.districtRaidChanceMultiplier *= 1 + 0.2 * overdrive.strength;
        }

        const crash = this.player.activeDrugEffects.overdriveCrash;
        if (crash.active) {
          modifiers.globalPerformanceMultiplier *= 0.9;
        }

        return modifiers;
      }

      runTick() {
        this.updateTimedEffects();
        this.updateProduction();
        this.applyPassiveHeat();
        this.updateDrugEffects();
      }

      logEvent(message) {
        const entry = {
          id: Date.now() + "-" + Math.random().toString(16).slice(2),
          createdAt: Date.now(),
          text: message
        };
        this.eventLog.unshift(entry);
        if (this.eventLog.length > 160) {
          this.eventLog.pop();
        }
      }

      formatDuration(ms) {
        if (ms <= 0) {
          return "0s";
        }
        const totalSeconds = Math.ceil(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) {
          return hours + "h " + minutes + "m";
        }
        if (minutes > 0) {
          return minutes + "m " + seconds + "s";
        }
        return seconds + "s";
      }

      formatNumber(value) {
        return (Math.round(value * 100) / 100).toLocaleString();
      }
    }

    // ==================================================
    // APP STATE
    // ==================================================
    const player = new PlayerModel();
    const drugLab = new DrugLabBuilding(player.id);
    const core = new DrugLabCoreSystem(player, drugLab);
    core.logEvent("Drug Lab core initialized.");

    // ==================================================
    // REQUIRED FUNCTION API (GLOBAL)
    // ==================================================
    function getScaledStat(baseValue, level) {
      return core.getScaledStat(baseValue, level);
    }

    function getUnlockedSlotCount() {
      return core.getUnlockedSlotCount();
    }

    function getStorageCapacity() {
      return core.getStorageCapacity();
    }

    function getCurrentStoredTotal() {
      return core.getCurrentStoredTotal();
    }

    function canStoreMore(amount) {
      return core.canStoreMore(amount);
    }

    function startProduction(slotId, drugType) {
      return core.startProduction(slotId, drugType);
    }

    function stopProduction(slotId) {
      return core.stopProduction(slotId);
    }

    function updateProduction() {
      return core.updateProduction();
    }

    function collectDrugs() {
      return core.collectDrugs();
    }

    function useDrug(drugType) {
      return core.useDrug(drugType);
    }

    function applyDrugEffect(drugType) {
      return core.applyDrugEffect(drugType);
    }

    function updateDrugEffects() {
      return core.updateDrugEffects();
    }

    function calculateCurrentHeatPerHour() {
      return core.calculateCurrentHeatPerHour();
    }

    function applyPassiveHeat() {
      return core.applyPassiveHeat();
    }

    function upgradeBuilding(p) {
      return core.upgradeBuilding(p || player);
    }

    function useOverclock(p) {
      return core.useOverclock(p || player);
    }

    function useCleanBatch(p) {
      return core.useCleanBatch(p || player);
    }

    function useHiddenOperation(p) {
      return core.useHiddenOperation(p || player);
    }

    function updateTimedEffects() {
      return core.updateTimedEffects();
    }

    // ==================================================
    // UI
    // ==================================================
    const el = {
      playerStats: document.getElementById("playerStats"),
      clockLabel: document.getElementById("clockLabel"),
      drugLabMeta: document.getElementById("drugLabMeta"),
      upgradeInfo: document.getElementById("upgradeInfo"),
      upgradeBtn: document.getElementById("upgradeBtn"),
      slotSummary: document.getElementById("slotSummary"),
      slotGrid: document.getElementById("slotGrid"),
      labStorageList: document.getElementById("labStorageList"),
      collectBtn: document.getElementById("collectBtn"),
      inventoryList: document.getElementById("inventoryList"),
      effectsList: document.getElementById("effectsList"),
      actionsList: document.getElementById("actionsList"),
      eventLogList: document.getElementById("eventLogList")
    };

    function formatCurrency(value) {
      return "$" + Math.floor(value).toLocaleString();
    }

    function formatHeat(value) {
      return Math.round(value * 100) / 100;
    }

    function formatDuration(ms) {
      return core.formatDuration(ms);
    }

    function getCooldownText(endsAt) {
      const remaining = endsAt - Date.now();
      if (remaining <= 0) {
        return "ready";
      }
      return formatDuration(remaining);
    }

    function renderPlayerStats() {
      const stats = [
        { label: "Cash", value: formatCurrency(player.cash) },
        { label: "Dirty Cash", value: formatCurrency(player.dirtyCash) },
        { label: "Influence", value: Math.floor(player.influence).toLocaleString() },
        { label: "Gang Members", value: Math.floor(player.gangMembers).toLocaleString() },
        { label: "Total Heat", value: formatHeat(player.totalHeat).toLocaleString() }
      ];

      el.playerStats.innerHTML = stats.map((stat) => (
        '<div class="stat"><div class="label">' + stat.label + '</div><div class="value">' + stat.value + '</div></div>'
      )).join("");
    }

    function renderDrugLabMeta() {
      const producingCount = drugLab.slots.filter((slot) => slot.isProducing && slot.id <= getUnlockedSlotCount()).length;
      const capacity = getStorageCapacity();
      const stored = getCurrentStoredTotal();
      const heatPerHour = calculateCurrentHeatPerHour();

      el.slotSummary.textContent = producingCount + "/" + getUnlockedSlotCount() + " producing";

      const metaItems = [
        { label: "Building", value: drugLab.name },
        { label: "Level", value: String(drugLab.level) },
        { label: "Unlocked Slots", value: String(getUnlockedSlotCount()) + "/4" },
        { label: "Storage Capacity", value: core.formatNumber(capacity) },
        { label: "Stored Amount", value: core.formatNumber(stored) },
        { label: "Current Heat/h", value: core.formatNumber(heatPerHour) },
        { label: "Overclock", value: drugLab.overclockActive ? "active" : "inactive" },
        { label: "Clean Batch", value: drugLab.cleanBatchActive ? "active" : "inactive" },
        { label: "Hidden Op", value: drugLab.hiddenOperationActive ? "active" : "inactive" }
      ];

      el.drugLabMeta.innerHTML = metaItems.map((item) => (
        '<div class="stat"><div class="label">' + item.label + '</div><div class="value">' + item.value + '</div></div>'
      )).join("");

      if (drugLab.level >= MAX_LAB_LEVEL) {
        el.upgradeInfo.textContent = "Max level reached.";
      } else {
        const nextLevel = drugLab.level + 1;
        const cost = UPGRADE_COSTS[nextLevel];
        el.upgradeInfo.textContent = "Next upgrade L" + nextLevel + " costs " + formatCurrency(cost) +
          ". Grants +1 slot, +100 storage, +10% production.";
      }

      const canUpgrade = drugLab.level < MAX_LAB_LEVEL && player.cash >= UPGRADE_COSTS[drugLab.level + 1];
      el.upgradeBtn.disabled = !canUpgrade;
      el.upgradeBtn.textContent = drugLab.level >= MAX_LAB_LEVEL
        ? "Max Level"
        : "Upgrade (" + formatCurrency(UPGRADE_COSTS[drugLab.level + 1]) + ")";
    }

    function renderSlots() {
      const unlocked = getUnlockedSlotCount();
      el.slotGrid.innerHTML = drugLab.slots.map((slot) => {
        const isLocked = slot.id > unlocked;
        const selectedDrug = slot.activeDrugType;
        const options = DRUG_ORDER.map((drugId) => {
          const config = DRUG_CONFIG[drugId];
          const selected = selectedDrug === drugId ? "selected" : "";
          return '<option value="' + drugId + '" ' + selected + '>' + config.name + '</option>';
        }).join("");
        const status = isLocked
          ? '<span class="pill status-danger">Locked</span>'
          : slot.isProducing
            ? '<span class="pill status-ok">Producing</span>'
            : '<span class="pill status-warn">Idle</span>';
        const elapsed = slot.startedAt ? formatDuration(Date.now() - slot.startedAt) : "0s";

        return (
          '<div class="slot-card ' + (isLocked ? "locked" : "") + '">' +
            '<div class="slot-head">' +
              '<strong>Slot #' + slot.id + '</strong>' +
              status +
            '</div>' +
            '<div class="tiny">Produced in this slot: ' + core.formatNumber(slot.producedAmount) + '</div>' +
            '<div class="tiny">Runtime: ' + elapsed + '</div>' +
            '<div class="slot-actions">' +
              '<select data-slot-select="' + slot.id + '" ' + (isLocked || slot.isProducing ? "disabled" : "") + '>' + options + '</select>' +
              '<button class="btn-good" data-slot-start="' + slot.id + '" ' + (isLocked || slot.isProducing ? "disabled" : "") + '>Start</button>' +
              '<button class="btn-danger" data-slot-stop="' + slot.id + '" ' + (isLocked || !slot.isProducing ? "disabled" : "") + '>Stop</button>' +
            '</div>' +
          '</div>'
        );
      }).join("");
    }

    function renderLabStorage() {
      const rows = DRUG_ORDER.map((drugId) => {
        const stack = drugLab.storage[drugId];
        const total = stack.normal + stack.enhanced;
        return (
          '<div class="row">' +
            '<div class="left">' +
              '<div class="name">' + DRUG_CONFIG[drugId].name + '</div>' +
              '<div class="desc">Normal: ' + core.formatNumber(stack.normal) + ' | Enhanced: ' + core.formatNumber(stack.enhanced) + '</div>' +
            '</div>' +
            '<div class="right"><strong>' + core.formatNumber(total) + '</strong></div>' +
          '</div>'
        );
      }).join("");
      el.labStorageList.innerHTML = rows;
      el.collectBtn.disabled = getCurrentStoredTotal() <= 0.0001;
    }

    function renderInventory() {
      el.inventoryList.innerHTML = DRUG_ORDER.map((drugId) => {
        const config = DRUG_CONFIG[drugId];
        const amount = player.drugs[drugId];
        const enhanced = player.enhancedDrugs[drugId];
        const canUse = amount >= config.useAmount;
        return (
          '<div class="row">' +
            '<div class="left">' +
              '<div class="name">' + config.name + '</div>' +
              '<div class="desc">' + config.description + '</div>' +
            '</div>' +
            '<div class="right">' +
              '<span class="pill">Owned: ' + core.formatNumber(amount) + '</span>' +
              '<span class="pill">Enhanced: ' + core.formatNumber(enhanced) + '</span>' +
              '<span class="pill">Use: ' + config.useAmount + '</span>' +
              '<button class="btn-good" data-use-drug="' + drugId + '" ' + (!canUse ? "disabled" : "") + '>Use</button>' +
            '</div>' +
          '</div>'
        );
      }).join("");
    }

    function getEffectLabel(effectId) {
      if (effectId === "overdriveCrash") {
        return "Overdrive Crash";
      }
      const config = DRUG_CONFIG[effectId];
      return config ? config.name : effectId;
    }

    function renderActiveEffects() {
      const now = Date.now();
      const activeRows = [];
      for (const [effectId, state] of Object.entries(player.activeDrugEffects)) {
        if (!state.active) {
          continue;
        }
        const remaining = Math.max(0, state.endsAt - now);
        const strengthLabel = state.strength && state.strength > 1 ? "x" + state.strength.toFixed(2) : "x1.00";
        activeRows.push(
          '<div class="row">' +
            '<div class="left">' +
              '<div class="name">' + getEffectLabel(effectId) + '</div>' +
              '<div class="desc">Strength: ' + strengthLabel + '</div>' +
            '</div>' +
            '<div class="right"><span class="pill">' + formatDuration(remaining) + '</span></div>' +
          '</div>'
        );
      }
      if (activeRows.length === 0) {
        el.effectsList.innerHTML = '<div class="row"><div class="left"><div class="name">No active effects</div><div class="desc">Use drugs from inventory to activate effects.</div></div></div>';
        return;
      }
      el.effectsList.innerHTML = activeRows.join("");
    }

    function renderActions() {
      const now = Date.now();
      const actions = [
        {
          id: "overclock",
          title: "Overclock",
          desc: "+50% production for 2h, +3 heat instantly",
          active: drugLab.overclockActive,
          endsAt: drugLab.overclockEndsAt,
          cooldownEndsAt: drugLab.overclockCooldownEndsAt,
          buttonClass: "btn-warn"
        },
        {
          id: "cleanBatch",
          title: "Clean Batch",
          desc: "All produced drugs become enhanced for 2h",
          active: drugLab.cleanBatchActive,
          endsAt: drugLab.cleanBatchEndsAt,
          cooldownEndsAt: drugLab.cleanBatchCooldownEndsAt,
          buttonClass: "btn-good"
        },
        {
          id: "hiddenOperation",
          title: "Hidden Operation",
          desc: "-30% production heat, -20% production for 2h",
          active: drugLab.hiddenOperationActive,
          endsAt: drugLab.hiddenOperationEndsAt,
          cooldownEndsAt: drugLab.hiddenOperationCooldownEndsAt,
          buttonClass: "btn-danger"
        }
      ];

      el.actionsList.innerHTML = actions.map((action) => {
        const activeRemaining = action.active ? Math.max(0, action.endsAt - now) : 0;
        const onCooldown = now < action.cooldownEndsAt;
        const buttonDisabled = action.active || onCooldown;
        const status = action.active
          ? '<span class="pill status-ok">Active: ' + formatDuration(activeRemaining) + '</span>'
          : onCooldown
            ? '<span class="pill status-warn">Cooldown: ' + getCooldownText(action.cooldownEndsAt) + '</span>'
            : '<span class="pill status-ok">Ready</span>';

        return (
          '<div class="row">' +
            '<div class="left">' +
              '<div class="name">' + action.title + '</div>' +
              '<div class="desc">' + action.desc + '</div>' +
            '</div>' +
            '<div class="right">' +
              status +
              '<button class="' + action.buttonClass + '" data-action="' + action.id + '" ' + (buttonDisabled ? "disabled" : "") + '>Activate</button>' +
            '</div>' +
          '</div>'
        );
      }).join("");
    }

    function renderEventLog() {
      if (core.eventLog.length === 0) {
        el.eventLogList.innerHTML = '<div class="log-entry"><span class="log-time">--:--:--</span>No events yet.</div>';
        return;
      }
      el.eventLogList.innerHTML = core.eventLog.map((entry) => {
        const time = new Date(entry.createdAt).toLocaleTimeString();
        return '<div class="log-entry"><span class="log-time">' + time + '</span>' + entry.text + '</div>';
      }).join("");
    }

    function renderClock() {
      const now = new Date();
      el.clockLabel.textContent = now.toLocaleString();
    }

    function renderAll() {
      renderClock();
      renderPlayerStats();
      renderDrugLabMeta();
      renderSlots();
      renderLabStorage();
      renderInventory();
      renderActiveEffects();
      renderActions();
      renderEventLog();
    }

    function handleClick(event) {
      const startButton = event.target.closest("[data-slot-start]");
      if (startButton) {
        const slotId = Number(startButton.getAttribute("data-slot-start"));
        const select = document.querySelector('[data-slot-select="' + slotId + '"]');
        const drugType = select ? select.value : "neonDust";
        startProduction(slotId, drugType);
        renderAll();
        return;
      }

      const stopButton = event.target.closest("[data-slot-stop]");
      if (stopButton) {
        const slotId = Number(stopButton.getAttribute("data-slot-stop"));
        stopProduction(slotId);
        renderAll();
        return;
      }

      const useButton = event.target.closest("[data-use-drug]");
      if (useButton) {
        const drugType = useButton.getAttribute("data-use-drug");
        useDrug(drugType);
        renderAll();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (actionButton) {
        const actionId = actionButton.getAttribute("data-action");
        if (actionId === "overclock") {
          useOverclock(player);
        } else if (actionId === "cleanBatch") {
          useCleanBatch(player);
        } else if (actionId === "hiddenOperation") {
          useHiddenOperation(player);
        }
        renderAll();
      }
    }

    function handleChange(event) {
      const select = event.target.closest("[data-slot-select]");
      if (!select) {
        return;
      }
      const slotId = Number(select.getAttribute("data-slot-select"));
      const slot = drugLab.slots.find((item) => item.id === slotId);
      if (!slot || slot.isProducing) {
        return;
      }
      if (!DRUG_CONFIG[select.value]) {
        return;
      }
      slot.activeDrugType = select.value;
    }

    function initUIEvents() {
      document.addEventListener("click", handleClick);
      document.addEventListener("change", handleChange);
      el.collectBtn.addEventListener("click", () => {
        collectDrugs();
        renderAll();
      });
      el.upgradeBtn.addEventListener("click", () => {
        upgradeBuilding(player);
        renderAll();
      });
    }

    function startLoop() {
      setInterval(() => {
        core.runTick();
        renderAll();
      }, UI_REFRESH_MS);
    }

    // Initial state for quick testing
    player.drugs.neonDust = 15;
    player.drugs.pulseShot = 8;
    player.drugs.velvetSmoke = 5;
    player.drugs.ghostSerum = 2;
    player.drugs.overdriveX = 1;

    player.enhancedDrugs.neonDust = 5;
    core.logEvent("Initial inventory preloaded for testing.");

    initUIEvents();
    renderAll();
    startLoop();

    // Export for easy integration into Empire Streets
    window.EmpireDrugLabCore = {
      player,
      drugLab,
      core,
      DRUG_CONFIG,
      SPECIAL_ACTION_CONFIG,
      getScaledStat,
      getUnlockedSlotCount,
      getStorageCapacity,
      getCurrentStoredTotal,
      canStoreMore,
      startProduction,
      stopProduction,
      updateProduction,
      collectDrugs,
      useDrug,
      applyDrugEffect,
      updateDrugEffects,
      calculateCurrentHeatPerHour,
      applyPassiveHeat,
      upgradeBuilding,
      useOverclock,
      useCleanBatch,
      useHiddenOperation,
      updateTimedEffects
    };
  </script>
</body>
</html>
